<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 60" fill="none">
  <!-- Icon mark: overlapping catalog shapes -->
  <g transform="translate(4, 8)">
    <!-- Back catalog -->
    <rect x="6" y="6" width="28" height="32" rx="4" fill="#E8453C" opacity="0.2" stroke="#E8453C" stroke-width="1.5"/>
    <line x1="12" y1="14" x2="28" y2="14" stroke="#E8453C" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
    <line x1="12" y1="19" x2="24" y2="19" stroke="#E8453C" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
    <!-- Front catalog -->
    <rect x="0" y="0" width="28" height="32" rx="4" fill="#1a1a1a" stroke="#E0E0E0" stroke-width="1.5"/>
    <line x1="6" y1="8" x2="22" y2="8" stroke="#E0E0E0" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="6" y1="13" x2="18" y2="13" stroke="#E0E0E0" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="6" y1="18" x2="20" y2="18" stroke="#E0E0E0" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <line x1="6" y1="23" x2="15" y2="23" stroke="#E0E0E0" stroke-width="1.5" stroke-linecap="round" opacity="0.3"/>
    <!-- Arrow overlay -->
    <path d="M18 16 L30 16" stroke="#E8453C" stroke-width="2" stroke-linecap="round"/>
    <path d="M27 12 L31 16 L27 20" stroke="#E8453C" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
  <!-- Text -->
  <text x="52" y="35" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="32" font-weight="700" letter-spacing="-0.5">
    <tspan fill="#FFFFFF">Clone</tspan><tspan fill="#E8453C" dx="1">→</tspan><tspan fill="#FFFFFF" dx="1">Xs</tspan>
  </text>
  <text x="52" y="50" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif" font-size="8.5" fill="#6B7280" letter-spacing="1.8" font-weight="500">UNITY CATALOG TOOLKIT</text>
</svg>
